version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: secure-api-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepass123
      POSTGRES_DB: secureapi
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
